<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>API Key Manager</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app">
    <main class="main">
      <header class="topbar">
        <div class="topbar-title">
          <span class="logo-icon">&#9881;</span>
          <h1>API Keys</h1>
          <button class="theme-toggle" id="themeToggle" title="切换主题">🌗</button>
        </div>
        <p class="topbar-desc">管理多个 API Key，一键复制 OpenAI 格式调用信息</p>
        <div class="topbar-actions">
          <button class="btn-add-provider" id="addProviderBtn">+ 添加厂商</button>
        </div>
      </header>

      <div class="cards" id="cardsContainer"></div>
    </main>
  </div>

  <!-- 添加厂商弹窗 -->
  <div class="modal-overlay" id="providerModal" style="display:none;">
    <div class="modal">
      <div class="modal-header">添加厂商</div>
      <div class="modal-body">
        <input class="input" id="newProviderName" placeholder="厂商标识（如：openai）" autocomplete="off" spellcheck="false" />
        <input class="input" id="newProviderUrl" placeholder="Base URL（如：https://api.openai.com/v1）" autocomplete="off" spellcheck="false" style="margin-top:8px;" />
      </div>
      <div class="modal-footer">
        <button class="btn-save-key" id="saveProviderBtn">添加</button>
        <button class="btn-cancel-key" id="cancelProviderBtn">取消</button>
      </div>
    </div>
  </div>

  <!-- 删除确认弹窗 -->
  <div class="modal-overlay" id="deleteModal" style="display:none;">
    <div class="modal modal-sm">
      <div class="modal-header">确认删除</div>
      <div class="modal-body" id="deleteModalBody">确定要删除此厂商吗？</div>
      <div class="modal-footer">
        <button class="btn-save-key" id="confirmDeleteBtn" style="background:var(--red);">删除</button>
        <button class="btn-cancel-key" id="cancelDeleteBtn">取消</button>
      </div>
    </div>
  </div>

  <div class="toast-container"></div>
  <script src="app.js"></script>
</body>
</html>
