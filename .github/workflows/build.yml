name: Build & Release

on:
  push:
    branches: [main, master, dev, tauri-rewrite, fix-windows-build-failure-fjfrZP]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  android:
    runs-on: ubuntu-22.04
    permissions:
      contents: write

    steps:
      - name: 检出代码
        uses: actions/checkout@v5

      - name: 安装 Rust 工具链
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android

      - name: 安装 JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: 安装 Android SDK 组件
        run: |
          echo "ANDROID_SDK_ROOT=${ANDROID_SDK_ROOT}"
          yes | ${ANDROID_SDK_ROOT}/cmdline-tools/*/bin/sdkmanager --licenses 2>/dev/null || true
          ${ANDROID_SDK_ROOT}/cmdline-tools/*/bin/sdkmanager --install "platforms;android-34" "build-tools;34.0.0"

      - name: 安装 Android NDK
        uses: nttld/setup-ndk@v1
        id: setup_ndk
        with:
          ndk-version: r26d
          add-to-path: true

      - name: 缓存 Rust 编译产物
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: 安装 Tauri CLI
        run: cargo install tauri-cli --version "^2.0" --locked

      - name: 初始化 Android 工程
        run: |
          export ANDROID_HOME="${ANDROID_SDK_ROOT}"
          export NDK_HOME="${{ steps.setup_ndk.outputs.ndk-path }}"
          echo "ANDROID_HOME=${ANDROID_HOME}"
          echo "NDK_HOME=${NDK_HOME}"
          cargo tauri android init

      - name: 生成 Android 图标资源
        run: cargo tauri icon build/icon.png
        continue-on-error: true

      - name: 构建 Android APK（debug）
        run: |
          export ANDROID_HOME="${ANDROID_SDK_ROOT}"
          export NDK_HOME="${{ steps.setup_ndk.outputs.ndk-path }}"
          echo "ANDROID_HOME=${ANDROID_HOME}"
          echo "NDK_HOME=${NDK_HOME}"
          cargo tauri android build --apk --debug --target aarch64

      - name: 上传 APK 产物
        uses: actions/upload-artifact@v5
        with:
          name: api-key-manager-android
          path: |
            src-tauri/gen/android/app/build/outputs/apk/**/*.apk
          if-no-files-found: warn

      - name: 读取版本号
        if: github.event_name == 'push' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main')
        shell: bash
        run: |
          VERSION=$(grep '^version' src-tauri/Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
          echo "VERSION=${VERSION}" >> $GITHUB_ENV

      - name: 发布 APK 到 GitHub Release
        if: github.event_name == 'push' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.VERSION }}
          files: |
            src-tauri/gen/android/app/build/outputs/apk/**/*.apk
          draft: false
          prerelease: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
