name: Build & Release

on:
  push:
    branches: [main, master, dev, tauri-rewrite, fix-windows-build-failure-fjfrZP]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            target: linux
          - platform: windows-latest
            target: windows
          - platform: macos-latest
            target: macos
    runs-on: ${{ matrix.platform }}
    permissions:
      contents: write

    steps:
      - name: 检出代码
        uses: actions/checkout@v5

      - name: 设置 Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: 安装 Rust 工具链
        uses: dtolnay/rust-toolchain@stable

      - name: 缓存 Rust 编译产物
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: 安装 Linux 系统依赖
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libssl-dev

      - name: 安装 cargo-binstall
        uses: cargo-bins/cargo-binstall@main

      - name: 安装 Tauri CLI
        run: cargo binstall tauri-cli --version "^2.0" --no-confirm --locked

      - name: 生成 Windows ICO 图标
        if: matrix.target == 'windows'
        shell: pwsh
        run: |
          $conf = Get-Content src-tauri/tauri.conf.json | ConvertFrom-Json
          $conf.bundle.icon = @("../build/icon.ico")
          $conf | ConvertTo-Json -Depth 10 | Set-Content src-tauri/tauri.conf.json

      - name: 构建应用
        run: cargo tauri build
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}

      - name: 上传构建产物
        uses: actions/upload-artifact@v5
        with:
          name: api-key-manager-${{ matrix.target }}
          path: |
            src-tauri/target/release/bundle/**/*.exe
            src-tauri/target/release/bundle/**/*.msi
            src-tauri/target/release/bundle/**/*.dmg
            src-tauri/target/release/bundle/**/*.app
            src-tauri/target/release/bundle/**/*.deb
            src-tauri/target/release/bundle/**/*.AppImage
            src-tauri/target/release/bundle/**/*.rpm
          if-no-files-found: warn

      - name: 读取版本号
        if: github.event_name == 'push' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main')
        id: version
        shell: bash
        run: |
          VERSION=$(grep '^version' src-tauri/Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
          echo "version=v${VERSION}" >> $GITHUB_OUTPUT
          echo "tag=v${VERSION}" >> $GITHUB_OUTPUT

      - name: 发布到 GitHub Release
        if: github.event_name == 'push' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.version }}
          body: |
            ## API Key Manager ${{ steps.version.outputs.version }}

            自动构建产物（Tauri 重构版），由 GitHub Actions 推送发布。

            ### 下载
            - Windows: `.exe` / `.msi` 安装包
            - macOS: `.dmg` 安装包
            - Linux: `.deb` / `.AppImage`

            ### 来源
            - 分支: ${{ github.ref_name }}
            - 平台: ${{ matrix.target }}
            - 提交: ${{ github.sha }}
          files: |
            src-tauri/target/release/bundle/**/*.exe
            src-tauri/target/release/bundle/**/*.msi
            src-tauri/target/release/bundle/**/*.dmg
            src-tauri/target/release/bundle/**/*.deb
            src-tauri/target/release/bundle/**/*.AppImage
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ===== Android 构建 =====
  android:
    runs-on: ubuntu-22.04
    permissions:
      contents: write

    steps:
      - name: 检出代码
        uses: actions/checkout@v5

      - name: 安装 Rust 工具链
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android

      - name: 安装 JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: 安装 Android SDK 组件
        run: |
          echo "SDK root: ${ANDROID_SDK_ROOT}"
          # accept licenses
          yes | ${ANDROID_SDK_ROOT}/cmdline-tools/*/bin/sdkmanager --licenses 2>/dev/null || true
          # install required packages
          ${ANDROID_SDK_ROOT}/cmdline-tools/*/bin/sdkmanager --install "platforms;android-34" "build-tools;34.0.0" "platform-tools"

      - name: 安装 Android NDK
        uses: nttld/setup-ndk@v1
        id: setup_ndk
        with:
          ndk-version: r26d
          add-to-path: true

      - name: 缓存 Rust 编译产物
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: 安装 cargo-binstall
        uses: cargo-bins/cargo-binstall@main

      - name: 安装 Tauri CLI
        run: cargo binstall tauri-cli --version "^2.0" --no-confirm --locked

      - name: 验证 Android 环境
        run: |
          echo "ANDROID_SDK_ROOT=${ANDROID_SDK_ROOT}"
          echo "JAVA_HOME_17_X64=${JAVA_HOME_17_X64}"
          echo "NDK_HOME=${{ steps.setup_ndk.outputs.ndk-path }}"
          ls -la ${ANDROID_SDK_ROOT}/cmdline-tools/*/bin/sdkmanager 2>&1 || true
          ls -la ${{ steps.setup_ndk.outputs.ndk-path }}/source.properties 2>&1 || true

      - name: 初始化 Android 工程
        shell: bash
        run: |
          export ANDROID_HOME="${ANDROID_SDK_ROOT}"
          export JAVA_HOME="${JAVA_HOME_17_X64}"
          export NDK_HOME="${{ steps.setup_ndk.outputs.ndk-path }}"
          echo "ANDROID_HOME=${ANDROID_HOME}"
          echo "JAVA_HOME=${JAVA_HOME}"
          echo "NDK_HOME=${NDK_HOME}"
          cargo tauri android init --ci

      - name: 生成自签 keystore 并配置签名
        shell: bash
        run: |
          ANDROID_DIR="src-tauri/gen/android"
          
          # 生成临时 keystore
          keytool -genkeypair -v \
            -keystore "${ANDROID_DIR}/app/debug.keystore" \
            -alias androiddebugkey \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass android -keypass android \
            -dname "CN=Android Debug, O=Android, C=US"

          # 写入 tauri.properties 配置签名（Tauri 原生支持）
          PROPS_FILE="${ANDROID_DIR}/app/tauri.properties"
          cat >> "${PROPS_FILE}" << 'PROPEOF'

keystorePath=app/debug.keystore
keystorePassword=android
keystoreAlias=androiddebugkey
keystoreAliasPassword=android
PROPEOF
          
          echo "tauri.properties 签名配置已写入"
          cat "${PROPS_FILE}"

      - name: 构建 Android APK（release，自签名，arm64 单架构）
        shell: bash
        run: |
          export ANDROID_HOME="${ANDROID_SDK_ROOT}"
          export JAVA_HOME="${JAVA_HOME_17_X64}"
          export NDK_HOME="${{ steps.setup_ndk.outputs.ndk-path }}"
          cargo tauri android build --apk --release --target aarch64 --ci

      - name: 上传 APK 产物
        uses: actions/upload-artifact@v5
        with:
          name: api-key-manager-android
          path: |
            src-tauri/gen/android/app/build/outputs/apk/**/*.apk
          if-no-files-found: warn

      - name: 读取版本号（Android）
        if: github.event_name == 'push' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main')
        shell: bash
        run: |
          VERSION=$(grep '^version' src-tauri/Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
          echo "VERSION=${VERSION}" >> $GITHUB_ENV

      - name: 发布 APK 到 GitHub Release
        if: github.event_name == 'push' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.VERSION }}
          files: |
            src-tauri/gen/android/app/build/outputs/apk/**/*.apk
          draft: false
          prerelease: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ===== iOS 构建 =====
  ios:
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - name: 检出代码
        uses: actions/checkout@v5

      - name: 安装 Rust 工具链
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios

      - name: 缓存 Rust 编译产物
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: 安装 cargo-binstall
        uses: cargo-bins/cargo-binstall@main

      - name: 安装 Tauri CLI
        run: cargo binstall tauri-cli --version "^2.0" --no-confirm --locked

      - name: 编译 Rust（iOS 真机）
        run: cargo build --target aarch64-apple-ios --manifest-path src-tauri/Cargo.toml

      - name: 初始化 iOS 工程
        run: cargo tauri ios init --ci
        continue-on-error: true

      - name: 构建 iOS（未签名）
        run: cargo tauri ios build --no-sign --ci
        continue-on-error: true

      - name: 上传 iOS 产物
        uses: actions/upload-artifact@v5
        with:
          name: api-key-manager-ios
          path: |
            src-tauri/gen/apple/build/**/*.app
            src-tauri/gen/apple/build/**/*.ipa
          if-no-files-found: warn
