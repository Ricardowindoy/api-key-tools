name: Build & Release

on:
  push:
    branches: [main, master, dev, tauri-rewrite, fix-windows-build-failure-fjfrZP]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            target: linux
          - platform: windows-latest
            target: windows
          - platform: macos-latest
            target: macos
    runs-on: ${{ matrix.platform }}
    permissions:
      contents: write

    steps:
      - name: 检出代码
        uses: actions/checkout@v5

      - name: 设置 Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: 安装 Rust 工具链
        uses: dtolnay/rust-toolchain@stable

      - name: 缓存 Rust 编译产物
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: 安装 Linux 系统依赖
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libssl-dev

      - name: 安装 Tauri CLI
        run: cargo install tauri-cli --version "^2.0" --locked

      - name: 生成 Windows ICO 图标
        if: matrix.target == 'windows'
        shell: pwsh
        run: |
          choco install imagemagick -y --no-progress
          magick convert build/icon.png -define icon:auto-resize=256,128,64,48,32,16 build/icon.ico
          # 更新 tauri.conf.json 使用 ico（仅在 bundle.icon 中设置，窗口级别不允许 icon）
          $conf = Get-Content src-tauri/tauri.conf.json | ConvertFrom-Json
          $conf.bundle.icon = @("../build/icon.ico")
          $conf | ConvertTo-Json -Depth 10 | Set-Content src-tauri/tauri.conf.json

      - name: 构建应用
        run: cargo tauri build
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}

      - name: 上传构建产物
        uses: actions/upload-artifact@v5
        with:
          name: api-key-manager-${{ matrix.target }}
          path: |
            src-tauri/target/release/bundle/nsis/**/*.exe
            src-tauri/target/release/bundle/msi/**/*.msi
            src-tauri/target/release/bundle/dmg/**/*.dmg
            src-tauri/target/release/bundle/macos/**/*.app
            src-tauri/target/release/bundle/deb/**/*.deb
            src-tauri/target/release/bundle/appimage/**/*.AppImage
            src-tauri/target/release/bundle/rpm/**/*.rpm
          if-no-files-found: warn

      - name: 读取版本号
        if: github.event_name == 'push' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main')
        id: version
        shell: bash
        run: |
          VERSION=$(grep '^version' src-tauri/Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
          echo "version=v${VERSION}" >> $GITHUB_OUTPUT
          echo "tag=v${VERSION}" >> $GITHUB_OUTPUT

      - name: 发布到 GitHub Release
        if: github.event_name == 'push' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.version }}
          body: |
            ## API Key Manager ${{ steps.version.outputs.version }}

            自动构建产物（Tauri 重构版），由 GitHub Actions 推送发布。

            ### 下载
            - Windows: `.exe` / `.msi` 安装包
            - macOS: `.dmg` 安装包
            - Linux: `.deb` / `.AppImage`

            ### 来源
            - 分支: ${{ github.ref_name }}
            - 平台: ${{ matrix.target }}
            - 提交: ${{ github.sha }}
          files: |
            src-tauri/target/release/bundle/nsis/**/*.exe
            src-tauri/target/release/bundle/msi/**/*.msi
            src-tauri/target/release/bundle/dmg/**/*.dmg
            src-tauri/target/release/bundle/deb/**/*.deb
            src-tauri/target/release/bundle/appimage/**/*.AppImage
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ===== Android 构建 =====
  android:
    runs-on: ubuntu-22.04
    permissions:
      contents: write

    steps:
      - name: 检出代码
        uses: actions/checkout@v5

      - name: 安装 Rust 工具链
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android

      - name: 安装 JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: 安装 Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: "platforms;android-34 build-tools;34.0.0"

      - name: 安装 Android NDK
        uses: nttld/setup-ndk@v1
        id: setup_ndk
        with:
          ndk-version: r26d
          add-to-path: true

      - name: 缓存 Rust 编译产物
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: 安装 Tauri CLI
        run: cargo install tauri-cli --version "^2.0" --locked

      - name: 初始化 Android 工程
        run: cargo tauri android init
        env:
          NDK_HOME: ${{ steps.setup_ndk.outputs.ndk-path }}

      - name: 注入 Android 相机权限和 feature
        run: |
          MANIFEST="src-tauri/gen/android/app/src/main/AndroidManifest.xml"
          if [ -f "$MANIFEST" ]; then
            echo "=== 注入 CAMERA 权限 ==="
            # 修复：使用 [[:space:]]* 匹配 INTERNET"/> 和 INTERNET" /> 两种格式
            sed -i '/<uses-permission android:name="android.permission.INTERNET"[[:space:]]*\/>/a\    <uses-permission android:name="android.permission.CAMERA" />' "$MANIFEST"
            sed -i '/<uses-permission android:name="android.permission.CAMERA"[[:space:]]*\/>/a\    <uses-feature android:name="android.hardware.camera" android:required="false" />' "$MANIFEST"
            echo "=== 注入后 Manifest ==="
            grep -n "INTERNET\|CAMERA\|camera" "$MANIFEST"
            # 验证 CAMERA 权限已注入
            if ! grep -q "CAMERA" "$MANIFEST"; then
              echo "ERROR: CAMERA 权限注入失败"
              exit 1
            fi
          else
            echo "ERROR: AndroidManifest.xml not found at $MANIFEST"
            exit 1
          fi

      - name: 添加 ProGuard 规则保护 WebView 摄像头权限回调
        run: |
          PROGUARD="src-tauri/gen/android/app/proguard-rules.pro"
          if [ -f "$PROGUARD" ]; then
            echo "" >> "$PROGUARD"
            echo "# 保持 RustWebChromeClient 方法不被 R8 移除" >> "$PROGUARD"
            echo "# 用于 WebView 摄像头权限请求回调 (onPermissionRequest)" >> "$PROGUARD"
            echo "-keep class com.apikeymanager.app.generated.RustWebChromeClient {" >> "$PROGUARD"
            echo "  public <methods>;" >> "$PROGUARD"
            echo "}" >> "$PROGUARD"
            echo "=== 已添加 ProGuard 规则 ==="
            grep -A5 "RustWebChromeClient" "$PROGUARD"
          else
            echo "ERROR: proguard-rules.pro not found at $PROGUARD"
            exit 1
          fi

      - name: 生成 Android 图标资源
        run: cargo tauri icon build/icon.png
        continue-on-error: true

      - name: 构建 Android APK（未签名 release，arm64 单架构）
        run: cargo tauri android build --apk --target aarch64
        env:
          NDK_HOME: ${{ steps.setup_ndk.outputs.ndk-path }}
          ANDROID_HOME: ${{ env.ANDROID_SDK_ROOT }}

      - name: 生成签名 keystore 并签名 APK
        run: |
          ANDROID_DIR="src-tauri/gen/android"
          APK_DIR="${ANDROID_DIR}/app/build/outputs/apk/release"
          KEYSTORE="src-tauri/keystore/debug.keystore"

          # 如果仓库中没有固定 keystore，则生成（仅首次）
          if [ ! -f "${KEYSTORE}" ]; then
            mkdir -p src-tauri/keystore
            keytool -genkeypair -v \
              -keystore "${KEYSTORE}" \
              -alias androiddebugkey \
              -keyalg RSA -keysize 2048 -validity 10000 \
              -storepass android -keypass android \
              -dname "CN=API Key Manager, O=ApiKeyManager, C=US"
            echo "=== 新生成固定 keystore ==="
          else
            echo "=== 使用仓库中的固定 keystore ==="
          fi

          echo "=== 验证 keystore ==="
          keytool -list -keystore "${KEYSTORE}" -storepass android

          # 找到未签名的 APK
          UNSIGNED_APK=$(find "${APK_DIR}" -name "*.apk" | head -1)
          echo "找到 APK: ${UNSIGNED_APK}"

          if [ -z "${UNSIGNED_APK}" ]; then
            UNSIGNED_APK=$(find src-tauri/gen/android -name "*.apk" | head -1)
            echo "在其他路径找到 APK: ${UNSIGNED_APK}"
          fi

          if [ -z "${UNSIGNED_APK}" ]; then
            echo "ERROR: 未找到 APK 文件"
            find src-tauri/gen/android -type f | head -50
            exit 1
          fi

          # 使用 apksigner 签名
          SIGNED_APK="${APK_DIR}/app-release-signed.apk"
          mkdir -p "${APK_DIR}"

          BUILD_TOOLS=$(ls -d ${ANDROID_SDK_ROOT}/build-tools/* | sort -V | tail -1)
          echo "使用 build-tools: ${BUILD_TOOLS}"

          "${BUILD_TOOLS}/apksigner" sign \
            --ks "${KEYSTORE}" \
            --ks-pass pass:android \
            --ks-key-alias androiddebugkey \
            --key-pass pass:android \
            --out "${SIGNED_APK}" \
            "${UNSIGNED_APK}"

          echo "=== 验证签名 ==="
          "${BUILD_TOOLS}/apksigner" verify --verbose "${SIGNED_APK}"

          echo "签名后的 APK: ${SIGNED_APK}"

      - name: 上传 APK 产物
        uses: actions/upload-artifact@v5
        with:
          name: api-key-manager-android
          path: |
            src-tauri/gen/android/app/build/outputs/apk/release/app-release-signed.apk
            src-tauri/keystore/debug.keystore
          if-no-files-found: warn

      - name: 读取版本号（Android）
        if: github.event_name == 'push' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main')
        shell: bash
        run: |
          VERSION=$(grep '^version' src-tauri/Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
          echo "VERSION=${VERSION}" >> $GITHUB_ENV

      - name: 发布 APK 到 GitHub Release
        if: github.event_name == 'push' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.VERSION }}
          files: |
            src-tauri/gen/android/app/build/outputs/apk/release/app-release-signed.apk
          draft: false
          prerelease: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ===== iOS 构建 =====
  ios:
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - name: 检出代码
        uses: actions/checkout@v5

      - name: 安装 Rust 工具链
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios,aarch64-apple-ios-sim,x86_64-apple-ios

      - name: 缓存 Rust 编译产物
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: 安装 Tauri CLI
        run: cargo install tauri-cli --version "^2.0" --locked

      - name: 初始化 iOS 工程
        run: cargo tauri ios init

      # 第一步：直接用 cargo 编译 iOS Rust 代码，确保移动端可编译（不依赖 Xcode 签名）
      - name: 编译 Rust（aarch64-apple-ios）
        run: cargo build --target aarch64-apple-ios --manifest-path src-tauri/Cargo.toml

      # 第二步：尝试完整 Xcode 构建（无签名），失败不阻断流程
      - name: 构建 iOS（未签名）
        run: cargo tauri ios build --no-sign
        continue-on-error: true

      - name: 上传 iOS 产物
        uses: actions/upload-artifact@v5
        with:
          name: api-key-manager-ios
          path: |
            src-tauri/gen/apple/build/**/*.app
            src-tauri/gen/apple/build/**/*.ipa
          if-no-files-found: warn
