name: Build & Package

on:
  push:
    branches: [main, master, dev]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v5

      - name: 设置 Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: 安装依赖
        run: npm ci

      - name: 安装 ImageMagick（用于生成 ICO 图标）
        shell: pwsh
        run: choco install imagemagick -y --no-progress

      - name: 生成 Windows ICO 图标（多尺寸）
        shell: pwsh
        run: magick convert build/icon.png -define icon:auto-resize=256,128,64,48,32,16 build/icon.ico

      - name: 更新 package.json 图标配置为 ICO
        shell: pwsh
        run: |
          $pkg = Get-Content package.json | ConvertFrom-Json
          $pkg.build.icon = "build/icon.ico"
          $pkg.build.win.icon = "build/icon.ico"
          $pkg.build.nsis.installerIcon = "build/icon.ico"
          $pkg.build.nsis.uninstallerIcon = "build/icon.ico"
          $pkg.build.nsis.installerHeaderIcon = "build/icon.ico"
          $pkg | ConvertTo-Json -Depth 10 | Set-Content package.json

      - name: 打包应用（Windows NSIS 安装包）
        run: npm run build:win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 上传构建产物（Artifact）
        uses: actions/upload-artifact@v5
        with:
          name: api-key-manager-windows
          path: build-dist/
          if-no-files-found: error

      - name: 读取版本号
        if: github.event_name == 'push' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main')
        id: version
        shell: pwsh
        run: |
          $pkg = Get-Content package.json | ConvertFrom-Json
          $ver = "v" + $pkg.version
          Write-Output "version=$ver" >> $env:GITHUB_OUTPUT
          Write-Output "tag=$ver" >> $env:GITHUB_OUTPUT

      - name: 发布到 GitHub Release
        if: github.event_name == 'push' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.version }}
          body: |
            ## API Key Manager ${{ steps.version.outputs.version }}

            自动构建产物，由 GitHub Actions 推送发布。

            ### 安装
            下载下方 `.exe` 安装包，双击运行即可。

            ### 来源
            - 分支: ${{ github.ref_name }}
            - 提交: ${{ github.sha }}
          files: build-dist/*.exe
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}