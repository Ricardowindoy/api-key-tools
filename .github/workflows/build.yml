name: Build & Release

on:
  push:
    branches: [main, master, dev, tauri-rewrite, fix-windows-build-failure-fjfrZP]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      max-parallel: 2
      matrix:
        include:
          - platform: ubuntu-22.04
            target: linux
          - platform: windows-latest
            target: windows
          - platform: macos-15
            target: macos
    runs-on: ${{ matrix.platform }}
    permissions:
      contents: write

    steps:
      - name: 检出代码
        uses: actions/checkout@v5

      - name: 设置 Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: 安装 Rust 工具链
        uses: dtolnay/rust-toolchain@stable

      - name: 缓存 Rust 编译产物
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: 安装 Linux 系统依赖
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libssl-dev

      - name: 安装 Tauri CLI
        run: cargo install tauri-cli --version "^2.0" --locked

      - name: 生成 Windows ICO 图标
        if: matrix.target == 'windows'
        shell: pwsh
        run: |
          choco install imagemagick -y --no-progress
          magick convert build/icon.png -define icon:auto-resize=256,128,64,48,32,16 build/icon.ico
          $conf = Get-Content src-tauri/tauri.conf.json | ConvertFrom-Json
          $conf.bundle.icon = @("../build/icon.ico")
          $conf | ConvertTo-Json -Depth 10 | Set-Content src-tauri/tauri.conf.json

      - name: 构建应用
        run: cargo tauri build
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}

      - name: 上传构建产物
        uses: actions/upload-artifact@v5
        with:
          name: api-key-manager-${{ matrix.target }}
          path: |
            src-tauri/target/release/bundle/**/*.exe
            src-tauri/target/release/bundle/**/*.msi
            src-tauri/target/release/bundle/**/*.dmg
            src-tauri/target/release/bundle/**/*.app
            src-tauri/target/release/bundle/**/*.deb
            src-tauri/target/release/bundle/**/*.AppImage
            src-tauri/target/release/bundle/**/*.rpm
          if-no-files-found: warn

      - name: 读取版本号
        if: github.event_name == 'push' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main')
        id: version
        shell: bash
        run: |
          VERSION=$(grep '^version' src-tauri/Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
          echo "version=v${VERSION}" >> $GITHUB_OUTPUT
          echo "tag=v${VERSION}" >> $GITHUB_OUTPUT

      - name: 发布到 GitHub Release
        if: github.event_name == 'push' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.version }}
          body: |
            ## API Key Manager ${{ steps.version.outputs.version }}

            自动构建产物（Tauri 重构版），由 GitHub Actions 推送发布。

            ### 下载
            - Windows: `.exe` / `.msi` 安装包
            - macOS: `.dmg` 安装包
            - Linux: `.deb` / `.AppImage`

            ### 来源
            - 分支: ${{ github.ref_name }}
            - 平台: ${{ matrix.target }}
            - 提交: ${{ github.sha }}
          files: |
            src-tauri/target/release/bundle/**/*.exe
            src-tauri/target/release/bundle/**/*.msi
            src-tauri/target/release/bundle/**/*.dmg
            src-tauri/target/release/bundle/**/*.deb
            src-tauri/target/release/bundle/**/*.AppImage
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ===== Android 构建（等桌面端跑完，避免并发超限）=====
  android:
    needs: build
    runs-on: ubuntu-22.04
    permissions:
      contents: write

    steps:
      - name: 检出代码
        uses: actions/checkout@v5

      - name: 安装 Rust 工具链
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android

      - name: 安装 JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: 安装 Android SDK 组件
        run: |
          echo "ANDROID_SDK_ROOT=${ANDROID_SDK_ROOT}"
          yes | ${ANDROID_SDK_ROOT}/cmdline-tools/*/bin/sdkmanager --licenses 2>/dev/null || true
          ${ANDROID_SDK_ROOT}/cmdline-tools/*/bin/sdkmanager --install "platforms;android-34" "build-tools;34.0.0"

      - name: 安装 Android NDK
        uses: nttld/setup-ndk@v1
        id: setup_ndk
        with:
          ndk-version: r26d
          add-to-path: true

      - name: 缓存 Rust 编译产物
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: 安装 Tauri CLI
        run: cargo install tauri-cli --version "^2.0" --locked

      - name: 初始化 Android 工程
        run: |
          export ANDROID_HOME="${ANDROID_SDK_ROOT}"
          export NDK_HOME="${{ steps.setup_ndk.outputs.ndk-path }}"
          echo "ANDROID_HOME=${ANDROID_HOME}"
          echo "NDK_HOME=${NDK_HOME}"
          cargo tauri android init

      - name: 生成 Android 图标资源
        run: cargo tauri icon build/icon.png
        continue-on-error: true

      - name: 构建 Android APK（未签名 release）
        run: |
          export ANDROID_HOME="${ANDROID_SDK_ROOT}"
          export NDK_HOME="${{ steps.setup_ndk.outputs.ndk-path }}"
          echo "ANDROID_HOME=${ANDROID_HOME}"
          echo "NDK_HOME=${NDK_HOME}"
          cargo tauri android build --apk --target aarch64

      - name: 查找并列出 APK
        run: |
          find src-tauri/gen/android/app/build/outputs/apk -name "*.apk" -ls 2>/dev/null || echo "no apk found yet"

      - name: 生成签名 keystore 并签名 APK
        run: |
          ANDROID_DIR="src-tauri/gen/android"
          APK_DIR="${ANDROID_DIR}/app/build/outputs/apk/release"
          
          # 生成 keystore
          keytool -genkeypair -v \
            -keystore "${ANDROID_DIR}/app/debug.keystore" \
            -alias androiddebugkey \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass android -keypass android \
            -dname "CN=Android Debug, O=Android, C=US"
          
          echo "=== 验证 keystore ==="
          keytool -list -keystore "${ANDROID_DIR}/app/debug.keystore" -storepass android
          
          # 找到未签名的 APK
          UNSIGNED_APK=$(find "${APK_DIR}" -name "*.apk" | head -1)
          echo "找到 APK: ${UNSIGNED_APK}"
          
          if [ -z "${UNSIGNED_APK}" ]; then
            UNSIGNED_APK=$(find src-tauri/gen/android -name "*.apk" | head -1)
            echo "在其他路径找到 APK: ${UNSIGNED_APK}"
          fi
          
          if [ -z "${UNSIGNED_APK}" ]; then
            echo "ERROR: 未找到 APK 文件"
            find src-tauri/gen/android -type f | head -50
            exit 1
          fi
          
          # 使用 apksigner 签名
          SIGNED_APK="${APK_DIR}/app-release-signed.apk"
          mkdir -p "${APK_DIR}"
          
          BUILD_TOOLS=$(ls -d ${ANDROID_SDK_ROOT}/build-tools/* | sort -V | tail -1)
          echo "使用 build-tools: ${BUILD_TOOLS}"
          
          "${BUILD_TOOLS}/apksigner" sign \
            --ks "${ANDROID_DIR}/app/debug.keystore" \
            --ks-pass pass:android \
            --ks-key-alias androiddebugkey \
            --key-pass pass:android \
            --out "${SIGNED_APK}" \
            "${UNSIGNED_APK}"
          
          echo "=== 验证签名 ==="
          "${BUILD_TOOLS}/apksigner" verify --verbose "${SIGNED_APK}"
          
          echo "签名后的 APK: ${SIGNED_APK}"

      - name: 上传 APK 产物
        uses: actions/upload-artifact@v5
        with:
          name: api-key-manager-android
          path: |
            src-tauri/gen/android/app/build/outputs/apk/release/app-release-signed.apk
          if-no-files-found: warn

      - name: 读取版本号
        if: github.event_name == 'push' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main')
        shell: bash
        run: |
          VERSION=$(grep '^version' src-tauri/Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
          echo "VERSION=${VERSION}" >> $GITHUB_ENV

      - name: 发布 APK 到 GitHub Release
        if: github.event_name == 'push' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.VERSION }}
          files: |
            src-tauri/gen/android/app/build/outputs/apk/release/app-release-signed.apk
          draft: false
          prerelease: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
