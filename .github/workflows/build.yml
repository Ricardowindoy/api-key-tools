name: Build & Package

on:
  push:
    branches: [main, master, dev]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v5

      - name: 设置 Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: 安装依赖
        run: npm ci

      - name: 打包应用（Windows NSIS 安装包）
        run: npm run build:win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 上传构建产物
        uses: actions/upload-artifact@v5
        with:
          name: api-key-manager-windows
          path: build-dist/
          if-no-files-found: error
