name: Build & Release

on:
  push:
    branches: [main, master, dev, tauri-rewrite, fix-windows-build-failure-fjfrZP]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      max-parallel: 2
      matrix:
        include:
          - platform: ubuntu-22.04
            target: linux
          - platform: windows-latest
            target: windows
          - platform: macos-15
            target: macos
    runs-on: ${{ matrix.platform }}
    permissions:
      contents: write

    steps:
      - name: 检出代码
        uses: actions/checkout@v5

      - name: 设置 Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: 安装 Rust 工具链
        uses: dtolnay/rust-toolchain@stable

      - name: 缓存 Rust 编译产物
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          save-if: ${{ github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main' }}

      - name: 安装 Linux 系统依赖
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libssl-dev

      - name: 安装 Tauri CLI
        run: cargo install tauri-cli --version "^2.0" --locked

      - name: 生成 Windows ICO 图标
        if: matrix.target == 'windows'
        shell: pwsh
        run: |
          choco install imagemagick -y --no-progress
          magick convert build/icon.png -define icon:auto-resize=256,128,64,48,32,16 build/icon.ico
          $conf = Get-Content src-tauri/tauri.conf.json | ConvertFrom-Json
          $conf.bundle.icon = @("../build/icon.ico")
          $conf | ConvertTo-Json -Depth 10 | Set-Content src-tauri/tauri.conf.json

      - name: 构建应用
        run: cargo tauri build
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}

      - name: 上传构建产物
        uses: actions/upload-artifact@v5
        with:
          name: api-key-manager-${{ matrix.target }}
          path: |
            src-tauri/target/release/bundle/**/*.exe
            src-tauri/target/release/bundle/**/*.msi
            src-tauri/target/release/bundle/**/*.dmg
            src-tauri/target/release/bundle/**/*.app
            src-tauri/target/release/bundle/**/*.deb
            src-tauri/target/release/bundle/**/*.AppImage
            src-tauri/target/release/bundle/**/*.rpm
          if-no-files-found: warn

      - name: 读取版本号
        if: github.event_name == 'push' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main')
        id: version
        shell: bash
        run: |
          VERSION=$(grep '^version' src-tauri/Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
          echo "version=v${VERSION}" >> $GITHUB_OUTPUT
          echo "tag=v${VERSION}" >> $GITHUB_OUTPUT

      - name: 发布到 GitHub Release
        if: github.event_name == 'push' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.version }}
          body: |
            ## API Key Manager ${{ steps.version.outputs.version }}

            自动构建产物（Tauri 重构版），由 GitHub Actions 推送发布。

            ### 下载
            - Windows: `.exe` / `.msi` 安装包
            - macOS: `.dmg` 安装包
            - Linux: `.deb` / `.AppImage`

            ### 来源
            - 分支: ${{ github.ref_name }}
            - 平台: ${{ matrix.target }}
            - 提交: ${{ github.sha }}
          files: |
            src-tauri/target/release/bundle/**/*.exe
            src-tauri/target/release/bundle/**/*.msi
            src-tauri/target/release/bundle/**/*.dmg
            src-tauri/target/release/bundle/**/*.deb
            src-tauri/target/release/bundle/**/*.AppImage
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ===== Android 构建（与桌面端并发）=====
  android:
    runs-on: ubuntu-22.04
    permissions:
      contents: write

    steps:
      - name: 检出代码
        uses: actions/checkout@v5

      - name: 释放磁盘空间
        run: |
          echo "=== 清理前 ===" && df -h /
          sudo rm -rf /usr/share/dotnet /opt/ghc /opt/hostedtoolcache/CodeQL /usr/local/share/boost /usr/local/share/chromium
          sudo docker image prune -af 2>/dev/null || true
          sudo apt-get autoremove -y 2>/dev/null || true
          sudo apt-get clean
          echo "=== 清理后 ===" && df -h /

      - name: 安装 Rust 工具链
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android

      - name: 安装 JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: 安装 Android SDK 组件
        run: |
          echo "ANDROID_SDK_ROOT=${ANDROID_SDK_ROOT}"
          ls -la ${ANDROID_SDK_ROOT}/cmdline-tools/ 2>/dev/null || echo "no cmdline-tools dir"
          SDKMANAGER=$(find ${ANDROID_SDK_ROOT}/cmdline-tools -name sdkmanager 2>/dev/null | head -1)
          if [ -z "$SDKMANAGER" ]; then
            echo "cmdline-tools 未预装，下载安装..."
            mkdir -p ${ANDROID_SDK_ROOT}/cmdline-tools/latest
            curl -sSL https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -o /tmp/cmdline-tools.zip
            unzip -q /tmp/cmdline-tools.zip -d /tmp/cmdline-tools
            mv /tmp/cmdline-tools/cmdline-tools/* ${ANDROID_SDK_ROOT}/cmdline-tools/latest/
            SDKMANAGER=${ANDROID_SDK_ROOT}/cmdline-tools/latest/bin/sdkmanager
            rm -rf /tmp/cmdline-tools /tmp/cmdline-tools.zip
          fi
          echo "使用 sdkmanager: ${SDKMANAGER}"
          yes | "$SDKMANAGER" --licenses 2>/dev/null || true
          "$SDKMANAGER" --install "platforms;android-34" "build-tools;34.0.0"

      - name: 安装 Android NDK
        uses: nttld/setup-ndk@v1
        id: setup_ndk
        with:
          ndk-version: r26d
          add-to-path: true

      - name: 缓存 Rust 编译产物
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          save-if: ${{ github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main' }}

      - name: 安装 Tauri CLI
        run: cargo install tauri-cli --version "^2.0" --locked

      - name: 初始化 Android 工程
        run: |
          export ANDROID_HOME="${ANDROID_SDK_ROOT}"
          export NDK_HOME="${{ steps.setup_ndk.outputs.ndk-path }}"
          echo "ANDROID_HOME=${ANDROID_HOME}"
          echo "NDK_HOME=${NDK_HOME}"
          cargo tauri android init

      - name: 生成 Android 图标资源
        run: cargo tauri icon build/icon.png
        continue-on-error: true

      - name: 构建 Android APK（未签名 release）
        run: |
          export ANDROID_HOME="${ANDROID_SDK_ROOT}"
          export NDK_HOME="${{ steps.setup_ndk.outputs.ndk-path }}"
          echo "ANDROID_HOME=${ANDROID_HOME}"
          echo "NDK_HOME=${NDK_HOME}"
          cargo tauri android build --apk --target aarch64

      - name: 查找并列出 APK
        run: |
          find src-tauri/gen/android/app/build/outputs/apk -name "*.apk" -ls 2>/dev/null || echo "no apk found yet"

      - name: 解码 release keystore 并签名 APK
        env:
          # 首次使用前需要在 GitHub Secrets 中配置 ANDROID_KEYSTORE_BASE64
          # 生成方式: base64 -w0 release.keystore > keystore_b64.txt
          # 然后作为 Secret 添加到仓库
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          ANDROID_DIR="src-tauri/gen/android"
          APK_DIR="${ANDROID_DIR}/app/build/outputs/apk/release"
          KEYSTORE_FILE="${ANDROID_DIR}/app/release.keystore"

          # 如果配置了 Secrets，使用固定 keystore；否则生成临时 keystore（仅用于测试）
          if [ -n "${ANDROID_KEYSTORE_BASE64}" ]; then
            echo "使用固定 release keystore（来自 GitHub Secrets）"
            echo "${ANDROID_KEYSTORE_BASE64}" | base64 -d > "${KEYSTORE_FILE}"
            KS_PASS="${ANDROID_KEYSTORE_PASSWORD}"
            KS_ALIAS="${ANDROID_KEY_ALIAS}"
            KEY_PASS="${ANDROID_KEY_PASSWORD}"
          else
            echo "⚠ 未配置 ANDROID_KEYSTORE_BASE64 Secret，使用临时 keystore"
            echo "⚠ 警告：临时 keystore 签名的 APK 无法做证书固定！"
            keytool -genkeypair -v \
              -keystore "${KEYSTORE_FILE}" \
              -alias release \
              -keyalg RSA -keysize 2048 -validity 10000 \
              -storepass release123 -keypass release123 \
              -dname "CN=API Key Manager, O=Release, C=US"
            KS_PASS="release123"
            KS_ALIAS="release"
            KEY_PASS="release123"
          fi

          echo "=== 提取证书 SHA-256 指纹 ==="
          keytool -list -v -keystore "${KEYSTORE_FILE}" -storepass "${KS_PASS}" -alias "${KS_ALIAS}" | grep -i "SHA256:" | head -1

          # 找到未签名的 APK
          UNSIGNED_APK=$(find "${APK_DIR}" -name "*.apk" | head -1)
          echo "找到 APK: ${UNSIGNED_APK}"

          if [ -z "${UNSIGNED_APK}" ]; then
            UNSIGNED_APK=$(find src-tauri/gen/android -name "*.apk" | head -1)
            echo "在其他路径找到 APK: ${UNSIGNED_APK}"
          fi

          if [ -z "${UNSIGNED_APK}" ]; then
            echo "ERROR: 未找到 APK 文件"
            find src-tauri/gen/android -type f | head -50
            exit 1
          fi

          # 使用 apksigner 签名（v2 签名，确保证书固定可校验）
          SIGNED_APK="${APK_DIR}/app-release-signed.apk"
          mkdir -p "${APK_DIR}"

          BUILD_TOOLS=$(ls -d ${ANDROID_SDK_ROOT}/build-tools/* | sort -V | tail -1)
          echo "使用 build-tools: ${BUILD_TOOLS}"

          "${BUILD_TOOLS}/apksigner" sign \
            --ks "${KEYSTORE_FILE}" \
            --ks-pass "pass:${KS_PASS}" \
            --ks-key-alias "${KS_ALIAS}" \
            --key-pass "pass:${KEY_PASS}" \
            --out "${SIGNED_APK}" \
            "${UNSIGNED_APK}"

          echo "=== 验证签名 ==="
          "${BUILD_TOOLS}/apksigner" verify --verbose "${SIGNED_APK}"

          echo "=== 提取签名证书 SHA-256（用于证书固定）==="
          "${BUILD_TOOLS}/apksigner" verify --print-certs "${SIGNED_APK}" 2>&1 | grep -i "SHA-256" | head -1

          echo "签名后的 APK: ${SIGNED_APK}"

      - name: 重命名 APK（统一命名风格）
        shell: bash
        run: |
          VERSION=$(grep '^version' src-tauri/Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
          APK_DIR="src-tauri/gen/android/app/build/outputs/apk/release"
          OLD="${APK_DIR}/app-release-signed.apk"
          NEW="${APK_DIR}/API-Key-Manager_${VERSION}_android-arm64.apk"
          mv "${OLD}" "${NEW}"
          echo "APK_PATH=${NEW}" >> $GITHUB_ENV
          echo "VERSION=${VERSION}" >> $GITHUB_ENV
          echo "APK 已重命名为: $(basename "${NEW}")"

      - name: 上传 APK 产物
        uses: actions/upload-artifact@v5
        with:
          name: api-key-manager-android
          path: |
            ${{ env.APK_PATH }}
          if-no-files-found: warn

      - name: 发布 APK 到 GitHub Release
        if: github.event_name == 'push' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.VERSION }}
          files: |
            ${{ env.APK_PATH }}
          draft: false
          prerelease: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
